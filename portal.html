<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Interno | HP Organizacao Contabil</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0A0D12; --bg2:#111720; --bg3:#1A2535;
      --border:rgba(200,214,229,0.1); --border2:rgba(200,214,229,0.18);
      --silver:#C8D6E5; --silver2:#8FA3B1; --silver3:#E2EAF0;
      --accent:#2C4A6E; --green:#1DB87A; --red:#E24B4A; --yellow:#EF9F27;
      --text:#E2EAF0; --text2:#8FA3B1;
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* LOGIN */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 0%,rgba(44,74,110,0.3),transparent 70%),var(--bg); }
    .login-box { background:var(--bg2); border:1px solid var(--border2); border-radius:20px; padding:2.5rem 2rem; width:100%; max-width:380px; box-shadow:0 32px 64px rgba(0,0,0,0.5); }
    .login-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:2rem; }
    .login-logo-mark { width:40px; height:40px; border-radius:10px; background:var(--bg3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; }
    .login-logo-mark i { color:var(--silver); font-size:20px; }
    .login-logo-name { font-size:15px; font-weight:600; color:var(--silver3); }
    .login-title { font-size:20px; font-weight:600; text-align:center; margin-bottom:4px; }
    .login-sub { font-size:13px; color:var(--text2); text-align:center; margin-bottom:2rem; }
    .login-field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    .login-field label { font-size:12px; color:var(--text2); }
    .login-field input { padding:10px 14px; font-size:14px; font-family:'Inter',sans-serif; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; color:var(--text); outline:none; }
    .login-btn { width:100%; padding:11px; font-size:14px; font-weight:600; font-family:'Inter',sans-serif; background:linear-gradient(135deg,#2C4A6E,#1A2535); border:1px solid var(--border2); border-radius:10px; color:var(--silver); cursor:pointer; margin-top:8px; }
    .login-error { font-size:12px; color:var(--red); text-align:center; margin-top:8px; display:none; }

    /* PORTAL */
    #portal-screen { display:none; min-height:100vh; }
    .topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 2rem; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar-logo { width:30px; height:30px; border-radius:8px; background:var(--bg3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; }
    .topbar-logo i { color:var(--silver); font-size:15px; }
    .topbar-name { font-size:14px; font-weight:600; color:var(--silver3); }
    .topbar-badge { font-size:10px; background:var(--bg3); border:1px solid var(--border2); color:var(--silver2); border-radius:20px; padding:2px 8px; }
    .topbar-right { display:flex; align-items:center; gap:12px; }
    .topbar-user { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:5px; }
    .logout-btn { font-size:12px; color:var(--text2); background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:4px; font-family:'Inter',sans-serif; }
    .logout-btn:hover { color:var(--red); }
    .portal-body { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 56px); }
    .sidebar { background:var(--bg2); border-right:1px solid var(--border); padding:1.5rem 1rem; display:flex; flex-direction:column; gap:4px; }
    .sidebar-label { font-size:10px; color:var(--text2); letter-spacing:0.6px; text-transform:uppercase; padding:0 8px; margin:12px 0 6px; }
    .sidebar-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; font-size:13px; color:var(--text2); cursor:pointer; border:none; background:none; font-family:'Inter',sans-serif; width:100%; text-align:left; }
    .sidebar-item i { font-size:16px; }
    .sidebar-item:hover { background:var(--bg3); color:var(--silver3); }
    .sidebar-item.active { background:var(--accent); color:var(--silver); }
    .sidebar-count { margin-left:auto; background:var(--bg3); border-radius:20px; padding:1px 7px; font-size:10px; color:var(--silver2); }
    .main { padding:2rem; overflow-y:auto; }

    /* LISTA */
    .search-title { font-size:20px; font-weight:600; margin-bottom:4px; }
    .search-sub { font-size:13px; color:var(--text2); margin-bottom:1.25rem; }
    .search-box { position:relative; margin-bottom:1.5rem; }
    .search-box i { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:18px; color:var(--text2); }
    .search-box input { width:100%; padding:12px 14px 12px 44px; font-size:14px; background:var(--bg2); border:1px solid var(--border2); border-radius:12px; color:var(--text); font-family:'Inter',sans-serif; outline:none; }
    .search-box input::placeholder { color:var(--text2); }
    .lista-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .btn-add { display:flex; align-items:center; gap:6px; padding:8px 14px; background:var(--accent); border:1px solid var(--border2); border-radius:8px; color:var(--silver); font-size:13px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; }
    .btn-add:hover { opacity:.85; }
    .clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .client-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.25rem; cursor:pointer; transition:border-color .2s,transform .2s; }
    .client-card:hover { border-color:var(--border2); transform:translateY(-3px); }
    .client-card-top { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .client-avatar { width:38px; height:38px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; color:var(--silver); flex-shrink:0; }
    .client-name { font-size:14px; font-weight:600; }
    .client-type { font-size:11px; color:var(--text2); margin-top:2px; }
    .client-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .tag { font-size:10px; border-radius:20px; padding:3px 8px; border:1px solid; }
    .tag-green { background:rgba(29,184,122,0.1); border-color:rgba(29,184,122,0.3); color:#1DB87A; }
    .tag-yellow { background:rgba(239,159,39,0.1); border-color:rgba(239,159,39,0.3); color:#EF9F27; }
    .tag-blue { background:rgba(44,74,110,0.3); border-color:rgba(200,214,229,0.2); color:var(--silver); }
    .tag-red { background:rgba(226,75,74,0.1); border-color:rgba(226,75,74,0.3); color:var(--red); }
    .no-results { text-align:center; padding:3rem; color:var(--text2); font-size:14px; grid-column:1/-1; }
    .cert-badge { font-size:10px; border-radius:20px; padding:3px 8px; font-weight:500; display:inline-flex; align-items:center; gap:3px; flex-shrink:0; }
    .cert-ok { background:rgba(29,184,122,0.12); color:#1DB87A; }
    .cert-alerta { background:rgba(239,159,39,0.12); color:#EF9F27; }
    .cert-vencido { background:rgba(226,75,74,0.12); color:#E24B4A; }
    .cert-sem { background:rgba(143,163,177,0.12); color:#8FA3B1; }
    .no-results i { font-size:32px; display:block; margin:0 auto 10px; opacity:.4; }

    /* FICHA */
    #ficha { display:none; }
    .ficha-header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; flex-wrap:wrap; }
    .back-btn { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text2); background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif; padding:6px 10px; border-radius:8px; }
    .back-btn:hover { color:var(--silver); background:var(--bg3); }
    .back-btn i { font-size:16px; }
    .ficha-avatar { width:52px; height:52px; border-radius:14px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; color:var(--silver); flex-shrink:0; }
    .ficha-nome { font-size:22px; font-weight:600; }
    .ficha-cnpj { font-size:13px; color:var(--text2); margin-top:2px; }
    .ficha-actions { margin-left:auto; display:flex; gap:8px; }
    .btn-salvar { display:flex; align-items:center; gap:6px; padding:8px 16px; background:var(--green); border:none; border-radius:8px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
    .btn-salvar:hover { opacity:.85; }
    .btn-excluir { display:flex; align-items:center; gap:6px; padding:8px 14px; background:transparent; border:1px solid rgba(226,75,74,0.3); border-radius:8px; color:var(--red); font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; }
    .btn-excluir:hover { background:rgba(226,75,74,0.1); }
    .ficha-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .ficha-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.25rem; }
    .ficha-card-full { grid-column:1/-1; }
    .ficha-card-title { font-size:11px; color:var(--text2); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:1rem; display:flex; align-items:center; gap:6px; }
    .ficha-card-title i { font-size:14px; color:var(--silver2); }

    /* CAMPOS EDITAVEIS */
    .field-row { display:flex; flex-direction:column; gap:4px; padding:8px 0; border-bottom:1px solid var(--border); }
    .field-row:last-child { border-bottom:none; }
    .field-label { font-size:11px; color:var(--text2); }
    .field-input { background:var(--bg3); border:1px solid transparent; border-radius:6px; padding:6px 8px; font-size:13px; font-weight:500; color:var(--text); font-family:'Inter',sans-serif; outline:none; width:100%; transition:border-color .2s; }
    .field-input:hover { border-color:var(--border2); }
    .field-input:focus { border-color:var(--silver2); background:var(--bg); }
    .field-select { background:var(--bg3); border:1px solid transparent; border-radius:6px; padding:6px 8px; font-size:13px; font-weight:500; color:var(--text); font-family:'Inter',sans-serif; outline:none; width:100%; cursor:pointer; transition:border-color .2s; }
    .field-select:hover { border-color:var(--border2); }
    .field-select:focus { border-color:var(--silver2); }

    /* OBRIGACOES */
    .obrigacoes-list { display:flex; flex-direction:column; gap:8px; }
    .obrig-item { display:flex; align-items:center; justify-content:space-between; background:var(--bg3); border-radius:10px; padding:10px 12px; gap:8px; }
    .obrig-left { display:flex; align-items:center; gap:8px; flex:1; }
    .obrig-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:var(--bg); flex-shrink:0; }
    .obrig-icon i { font-size:15px; color:var(--silver2); }
    .obrig-inputs { display:flex; flex-direction:column; gap:3px; flex:1; }
    .obrig-name-input { background:transparent; border:none; font-size:13px; font-weight:500; color:var(--text); font-family:'Inter',sans-serif; outline:none; width:100%; }
    .obrig-name-input:focus { background:var(--bg); border-radius:4px; padding:2px 4px; }
    .obrig-desc-input { background:transparent; border:none; font-size:11px; color:var(--text2); font-family:'Inter',sans-serif; outline:none; width:100%; }
    .obrig-desc-input:focus { background:var(--bg); border-radius:4px; padding:2px 4px; }
    .obrig-status-select { font-size:11px; border-radius:20px; padding:3px 9px; font-weight:500; cursor:pointer; border:none; outline:none; font-family:'Inter',sans-serif; }
    .sel-ok { background:rgba(29,184,122,0.15); color:#1DB87A; }
    .sel-pend { background:rgba(239,159,39,0.15); color:#EF9F27; }
    .sel-atraso { background:rgba(226,75,74,0.15); color:#E24B4A; }
    .btn-rm-obrig { background:none; border:none; color:var(--text2); cursor:pointer; padding:4px; border-radius:4px; flex-shrink:0; }
    .btn-rm-obrig:hover { color:var(--red); }
    .btn-add-obrig { display:flex; align-items:center; gap:5px; background:none; border:1px dashed var(--border2); border-radius:8px; padding:8px 12px; color:var(--text2); font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; margin-top:8px; width:100%; }
    .btn-add-obrig:hover { border-color:var(--silver2); color:var(--silver); }

    /* TOAST */
    #toast { position:fixed; bottom:2rem; right:2rem; background:var(--green); color:#fff; padding:10px 18px; border-radius:10px; font-size:13px; font-weight:500; display:none; z-index:999; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
    .obs-box { background:var(--bg3); border-radius:10px; padding:12px; font-size:13px; line-height:1.7; min-height:80px; border:1px solid var(--border); outline:none; width:100%; font-family:'Inter',sans-serif; resize:vertical; color:var(--text); }
    .obs-box:focus { border-color:var(--silver2); }

    /* MODAL NOVO CLIENTE */
    #modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
    #modal-bg.show { display:flex; }
    .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:16px; padding:2rem; width:100%; max-width:460px; }
    .modal-title { font-size:16px; font-weight:600; margin-bottom:1.5rem; display:flex; align-items:center; justify-content:space-between; }
    .modal-close { background:none; border:none; color:var(--text2); cursor:pointer; font-size:20px; }
    .modal-field { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
    .modal-field label { font-size:12px; color:var(--text2); }
    .modal-field input, .modal-field select { padding:9px 12px; font-size:13px; font-family:'Inter',sans-serif; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; color:var(--text); outline:none; }
    .modal-actions { display:flex; gap:8px; margin-top:1rem; justify-content:flex-end; }
    .btn-cancel { padding:8px 16px; background:none; border:1px solid var(--border2); border-radius:8px; color:var(--text2); font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; }
    .btn-confirm { padding:8px 16px; background:var(--accent); border:none; border-radius:8px; color:var(--silver); font-size:13px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  </style>
</head>
<body>

<div id="toast">Salvo com sucesso!</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark"><i class="ti ti-chart-pie"></i></div>
      <span class="login-logo-name">HP Organizacao Contabil</span>
    </div>
    <div class="login-title">Portal Interno</div>
    <p class="login-sub">Acesso restrito a equipe HP</p>
    <div class="login-field"><label>Usuario</label><input type="text" id="login-user" placeholder="seu usuario" /></div>
    <div class="login-field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
    <button class="login-btn" onclick="fazerLogin()">Entrar no portal</button>
    <p class="login-error" id="login-error">Usuario ou senha incorretos.</p>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><i class="ti ti-chart-pie"></i></div>
      <span class="topbar-name">HP Organizacao Contabil</span>
      <span class="topbar-badge">Portal Interno</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user"><i class="ti ti-user"></i> <span id="user-name">Admin</span></span>
      <button class="logout-btn" onclick="logout()"><i class="ti ti-logout"></i> Sair</button>
    </div>
  </div>
  <div class="portal-body">
    <aside class="sidebar">
      <div class="sidebar-label">Menu</div>
      <button class="sidebar-item active" onclick="voltarLista()"><i class="ti ti-users"></i> Clientes <span class="sidebar-count" id="total-clientes">0</span></button>
      <div class="sidebar-label">Relatorios</div>
      <button class="sidebar-item" onclick="gerarRelatorio()"><i class="ti ti-file-report"></i> Certificados</button>
      <div class="sidebar-label">Sistema</div>
      <button class="sidebar-item"><i class="ti ti-settings"></i> Configuracoes</button>
    </aside>
    <main class="main">
      <!-- LISTA -->
      <div id="lista">
        <div class="lista-header">
          <div>
            <div class="search-title">Clientes</div>
            <p class="search-sub">Busque pelo nome ou CNPJ.</p>
          </div>
          <button class="btn-add" onclick="abrirModal()"><i class="ti ti-plus"></i> Novo cliente</button>
        </div>
        <div class="search-box">
          <i class="ti ti-search"></i>
          <input type="text" id="busca" placeholder="Digite o nome ou CNPJ..." oninput="buscarCliente()" />
        </div>
        <div class="clients-grid" id="clients-grid"></div>
      </div>

      <!-- FICHA -->
      <div id="ficha">
        <div class="ficha-header">
          <button class="back-btn" onclick="voltarLista()"><i class="ti ti-arrow-left"></i> Voltar</button>
          <div class="ficha-avatar" id="ficha-avatar"></div>
          <div>
            <div class="ficha-nome" id="ficha-nome-label"></div>
            <div class="ficha-cnpj" id="ficha-cnpj-label"></div>
          </div>
          <div class="ficha-actions">
            <button class="btn-salvar" onclick="salvarCliente()"><i class="ti ti-device-floppy"></i> Salvar</button>
            <button class="btn-excluir" onclick="excluirCliente()"><i class="ti ti-trash"></i> Excluir</button>
          </div>
        </div>
        <div class="ficha-grid" id="ficha-grid"></div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL NOVO CLIENTE -->
<div id="modal-bg">
  <div class="modal">
    <div class="modal-title">Novo cliente <button class="modal-close" onclick="fecharModal()"><i class="ti ti-x"></i></button></div>
    <div class="modal-field"><label>Nome / Razao social</label><input type="text" id="m-nome" placeholder="Ex: Angela Ltda" /></div>
    <div class="modal-field"><label>CNPJ</label><input type="text" id="m-cnpj" placeholder="00.000.000/0001-00" /></div>
    <div class="modal-field"><label>Socio</label><input type="text" id="m-socio" placeholder="Nome do socio" /></div>
    <div class="modal-field"><label>Tipo</label>
      <select id="m-tipo"><option>Servico</option><option>Comercio</option><option>Industria</option><option>Construcao</option></select>
    </div>
    <div class="modal-field"><label>Regime tributario</label>
      <select id="m-regime"><option>Simples Nacional</option><option>Lucro Presumido</option><option>Lucro Real</option><option>MEI</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirm" onclick="criarCliente()">Criar cliente</button>
    </div>
  </div>
</div>

<script>
var USUARIOS = [{ user: 'hp', pass: 'hp2024', nome: 'Administrador' }];
var clienteAtualId = null;
var nextId = 2;

var clientes = [
  {
    id: 1,
    nome: 'Angela Ltda',
    cnpj: '45.595.511/0001-31',
    tipo: 'Servico',
    socio: 'Angela Mattos',
    regime: 'Simples Nacional',
    situacao: 'Ativa',
    codigo: '420',
    email: '-',
    telefone: '-',
    endereco: '-',
    tags: ['DAS', 'Cod. 420', 'DARF INSS', 'Pro-labore'],
    obrigacoes: [
      { nome: 'Guia DAS', desc: 'Simples Nacional - mensal', status: 'ok' },
      { nome: 'DARF INSS', desc: 'Codigo 2100 - mensal', status: 'ok' },
      { nome: 'Pro-labore', desc: 'Codigo 420 - mensal', status: 'pend' }
    ],
    certificado: { tipo: 'e-CNPJ A1', validade: '2025-12-31', emissor: 'Serasa Experian' },
    obs: 'Cliente ativo. Verificar pagamento do pro-labore mensal.'
  }
];

function certStatusInfo(validade) {
  if (!validade) return { tipo: 'sem', label: 'Sem cert.' };
  var hoje = new Date();
  var val = new Date(validade + 'T12:00:00');
  var dias = Math.ceil((val - hoje) / 86400000);
  if (dias < 0) return { tipo: 'vencido', label: 'Vencido' };
  if (dias <= 60) return { tipo: 'alerta', label: 'Vence em ' + dias + 'd' };
  return { tipo: 'ok', label: 'Cert. OK' };
}

function gerarRelatorio() {
  var linhas = '';
  var vencidos = 0, alertas = 0, ok = 0, sem = 0;
  for (var i = 0; i < clientes.length; i++) {
    var c = clientes[i];
    var ci = certStatusInfo(c.certificado.validade);
    var cor = ci.tipo === 'ok' ? '#1DB87A' : ci.tipo === 'alerta' ? '#EF9F27' : ci.tipo === 'vencido' ? '#E24B4A' : '#8FA3B1';
    var val = c.certificado.validade ? new Date(c.certificado.validade + 'T12:00:00').toLocaleDateString('pt-BR') : '-';
    linhas += '<tr><td>' + c.nome + '</td><td>' + c.cnpj + '</td><td>' + c.certificado.tipo + '</td><td>' + val + '</td>' +
      '<td><span style="color:' + cor + ';font-weight:600;">' + ci.label + '</span></td></tr>';
    if (ci.tipo === 'ok') ok++;
    else if (ci.tipo === 'alerta') alertas++;
    else if (ci.tipo === 'vencido') vencidos++;
    else sem++;
  }
  var janela = window.open('', '_blank');
  janela.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio Certificados - HP</title>' +
    '<style>body{font-family:Inter,sans-serif;padding:2rem;color:#1A2535;background:#fff;}' +
    'h1{font-size:20px;font-weight:600;margin-bottom:4px;}' +
    '.sub{font-size:13px;color:#64748B;margin-bottom:2rem;}' +
    '.resumo{display:flex;gap:16px;margin-bottom:2rem;flex-wrap:wrap;}' +
    '.res-card{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;}' +
    '.res-ok{background:#EEFAF4;color:#059669;}' +
    '.res-alerta{background:#FFF8EE;color:#D97706;}' +
    '.res-vencido{background:#FEF2F2;color:#E24B4A;}' +
    '.res-sem{background:#F1F5F9;color:#64748B;}' +
    'table{width:100%;border-collapse:collapse;font-size:13px;}' +
    'th{text-align:left;padding:10px 12px;background:#F8FAFC;border-bottom:2px solid #E2E8F0;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#64748B;}' +
    'td{padding:10px 12px;border-bottom:1px solid #F1F5F9;}' +
    'tr:hover td{background:#F8FAFC;}' +
    '.footer{margin-top:2rem;font-size:11px;color:#94A3B8;}' +
    '@media print{body{padding:1rem}}' +
    '</style></head><body>' +
    '<h1>Relatorio de Certificados Digitais</h1>' +
    '<p class="sub">HP Organizacao Contabil &mdash; Gerado em ' + new Date().toLocaleDateString('pt-BR') + '</p>' +
    '<div class="resumo">' +
    '<div class="res-card res-ok">✓ Validos: ' + ok + '</div>' +
    '<div class="res-card res-alerta">⚠ Vencendo: ' + alertas + '</div>' +
    '<div class="res-card res-vencido">✗ Vencidos: ' + vencidos + '</div>' +
    '<div class="res-card res-sem">— Sem cert.: ' + sem + '</div>' +
    '</div>' +
    '<table><thead><tr><th>Cliente</th><th>CNPJ</th><th>Tipo</th><th>Validade</th><th>Status</th></tr></thead><tbody>' +
    linhas + '</tbody></table>' +
    '<div class="footer">HP Organizacao Contabil &mdash; Portal Interno</div>' +
    '<script>window.print()<\/script>' +
    '</body></html>');
  janela.document.close();
}

// ── LOCALSTORAGE ──
function salvarDados() {
  localStorage.setItem('hp_clientes', JSON.stringify(clientes));
  localStorage.setItem('hp_nextid', String(nextId));
}

function carregarDados() {
  var dados = localStorage.getItem('hp_clientes');
  var nid = localStorage.getItem('hp_nextid');
  if (dados) {
    try { clientes = JSON.parse(dados); } catch(e) {}
  }
  if (nid) nextId = parseInt(nid);
}

// Carrega ao iniciar
carregarDados();

function fazerLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var found = null;
  for (var i = 0; i < USUARIOS.length; i++) {
    if (USUARIOS[i].user === u && USUARIOS[i].pass === p) { found = USUARIOS[i]; break; }
  }
  if (found) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('portal-screen').style.display = 'block';
    document.getElementById('user-name').textContent = found.nome;
    renderLista(clientes);
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('login-pass').addEventListener('keydown', function(e) { if (e.key === 'Enter') fazerLogin(); });

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('portal-screen').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function iniciais(nome) {
  var p = nome.trim().split(' ');
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function tagClass(tag) {
  tag = tag.toLowerCase();
  if (tag.indexOf('das') >= 0 || tag.indexOf('ativa') >= 0) return 'tag-green';
  if (tag.indexOf('inss') >= 0 || tag.indexOf('darf') >= 0) return 'tag-yellow';
  return 'tag-blue';
}

function renderLista(lista) {
  document.getElementById('total-clientes').textContent = clientes.length;
  var grid = document.getElementById('clients-grid');
  if (!lista.length) {
    grid.innerHTML = '<div class="no-results"><i class="ti ti-search"></i>Nenhum cliente encontrado.</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < lista.length; i++) {
    var c = lista[i];
    var tags = '';
    for (var t = 0; t < c.tags.length; t++) {
      tags += '<span class="tag ' + tagClass(c.tags[t]) + '">' + c.tags[t] + '</span>';
    }
    html += '<div class="client-card" onclick="abrirFicha(' + c.id + ')">';
    html += '<div class="client-card-top"><div class="client-avatar">' + iniciais(c.nome) + '</div>';
    html += '<div><div class="client-name">' + c.nome + '</div><div class="client-type">' + c.tipo + ' - ' + c.regime + '</div></div></div>';
    html += '<div class="client-tags">' + tags + '</div></div>';
  }
  grid.innerHTML = html;
}

function buscarCliente() {
  var q = document.getElementById('busca').value.toLowerCase();
  var r = [];
  for (var i = 0; i < clientes.length; i++) {
    if (clientes[i].nome.toLowerCase().indexOf(q) >= 0 || clientes[i].cnpj.indexOf(q) >= 0) r.push(clientes[i]);
  }
  renderLista(r);
}

function statusCert(validade) {
  var hoje = new Date();
  var val = new Date(validade);
  var dias = Math.ceil((val - hoje) / 86400000);
  if (dias < 0) return { label: 'Vencido', cls: 'sel-atraso' };
  if (dias <= 30) return { label: 'Vence em ' + dias + ' dias', cls: 'sel-pend' };
  return { label: 'Valido', cls: 'sel-ok' };
}

function fmtData(str) {
  if (!str) return '-';
  var d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('pt-BR');
}

function abrirFicha(id) {
  var c = null;
  for (var i = 0; i < clientes.length; i++) { if (clientes[i].id === id) { c = clientes[i]; break; } }
  clienteAtualId = id;
  document.getElementById('lista').style.display = 'none';
  document.getElementById('ficha').style.display = 'block';
  document.getElementById('ficha-avatar').textContent = iniciais(c.nome);
  document.getElementById('ficha-nome-label').textContent = c.nome;
  document.getElementById('ficha-cnpj-label').textContent = 'CNPJ: ' + c.cnpj;

  var cert = statusCert(c.certificado.validade);

  // Obrigacoes
  var obrigHtml = '<div class="obrigacoes-list" id="obrig-list">';
  for (var i = 0; i < c.obrigacoes.length; i++) {
    obrigHtml += renderObrig(c.obrigacoes[i], i);
  }
  obrigHtml += '</div>';
  obrigHtml += '<button class="btn-add-obrig" onclick="addObrig()"><i class="ti ti-plus"></i> Adicionar obrigacao</button>';

  document.getElementById('ficha-grid').innerHTML =
    // DADOS
    '<div class="ficha-card">' +
      '<div class="ficha-card-title"><i class="ti ti-building"></i> Dados da empresa</div>' +
      campoEdit('nome', 'Razao social', c.nome, 'text') +
      campoEdit('cnpj', 'CNPJ', c.cnpj, 'text') +
      campoSelect('tipo', 'Tipo', c.tipo, ['Servico','Comercio','Industria','Construcao','Saude']) +
      campoEdit('socio', 'Socio principal', c.socio, 'text') +
      campoSelect('regime', 'Regime tributario', c.regime, ['Simples Nacional','Lucro Presumido','Lucro Real','MEI']) +
      campoEdit('codigo', 'Codigo atividade', c.codigo, 'text') +
      campoEdit('email', 'E-mail', c.email, 'email') +
      campoEdit('telefone', 'Telefone', c.telefone, 'text') +
      campoEdit('endereco', 'Endereco', c.endereco, 'text') +
      campoSelect('situacao', 'Situacao', c.situacao, ['Ativa','Inativa','Suspensa']) +
    '</div>' +

    // CERTIFICADO
    '<div class="ficha-card">' +
      '<div class="ficha-card-title"><i class="ti ti-certificate"></i> Certificado Digital</div>' +
      campoSelect('cert-tipo', 'Tipo', c.certificado.tipo, ['e-CNPJ A1','e-CNPJ A3','e-CPF A1','e-CPF A3','Nao possui']) +
      campoEdit('cert-validade', 'Validade', c.certificado.validade, 'date') +
      campoEdit('cert-emissor', 'Emissor', c.certificado.emissor, 'text') +
      '<div class="field-row"><span class="field-label">Status</span><span class="tag ' + (cert.cls === 'sel-ok' ? 'tag-green' : cert.cls === 'sel-pend' ? 'tag-yellow' : 'tag-red') + '" id="cert-status-label">' + cert.label + '</span></div>' +
    '</div>' +

    // OBRIGACOES
    '<div class="ficha-card">' +
      '<div class="ficha-card-title"><i class="ti ti-calendar-check"></i> Obrigacoes mensais</div>' +
      obrigHtml +
    '</div>' +

    // OBSERVACOES
    '<div class="ficha-card">' +
      '<div class="ficha-card-title"><i class="ti ti-notes"></i> Observacoes</div>' +
      '<textarea class="obs-box" id="campo-obs" rows="5">' + c.obs + '</textarea>' +
    '</div>';

  // Atualiza status cert ao mudar validade
  document.getElementById('cert-validade').addEventListener('change', function() {
    var nc = statusCert(this.value);
    var lbl = document.getElementById('cert-status-label');
    lbl.textContent = nc.label;
    lbl.className = 'tag ' + (nc.cls === 'sel-ok' ? 'tag-green' : nc.cls === 'sel-pend' ? 'tag-yellow' : 'tag-red');
  });
}

function campoEdit(id, label, valor, tipo) {
  return '<div class="field-row"><span class="field-label">' + label + '</span>' +
    '<input class="field-input" id="campo-' + id + '" type="' + tipo + '" value="' + (valor || '') + '" /></div>';
}

function campoSelect(id, label, valor, opcoes) {
  var opts = '';
  for (var i = 0; i < opcoes.length; i++) {
    opts += '<option' + (opcoes[i] === valor ? ' selected' : '') + '>' + opcoes[i] + '</option>';
  }
  return '<div class="field-row"><span class="field-label">' + label + '</span>' +
    '<select class="field-select" id="campo-' + id + '">' + opts + '</select></div>';
}

function renderObrig(o, idx) {
  var sCls = o.status === 'ok' ? 'sel-ok' : o.status === 'pend' ? 'sel-pend' : 'sel-atraso';
  return '<div class="obrig-item" id="obrig-' + idx + '">' +
    '<div class="obrig-icon"><i class="ti ti-file-invoice"></i></div>' +
    '<div class="obrig-inputs">' +
      '<input class="obrig-name-input" id="oname-' + idx + '" value="' + o.nome + '" placeholder="Nome da obrigacao" />' +
      '<input class="obrig-desc-input" id="odesc-' + idx + '" value="' + o.desc + '" placeholder="Descricao" />' +
    '</div>' +
    '<select class="obrig-status-select ' + sCls + '" id="ostatus-' + idx + '" onchange="atualizarCorStatus(this)">' +
      '<option value="ok"' + (o.status === 'ok' ? ' selected' : '') + '>Em dia</option>' +
      '<option value="pend"' + (o.status === 'pend' ? ' selected' : '') + '>Pendente</option>' +
      '<option value="atraso"' + (o.status === 'atraso' ? ' selected' : '') + '>Em atraso</option>' +
    '</select>' +
    '<button class="btn-rm-obrig" onclick="removerObrig(' + idx + ')"><i class="ti ti-trash" style="font-size:14px"></i></button>' +
  '</div>';
}

function atualizarCorStatus(sel) {
  sel.className = 'obrig-status-select ' + (sel.value === 'ok' ? 'sel-ok' : sel.value === 'pend' ? 'sel-pend' : 'sel-atraso');
}

function addObrig() {
  var c = getClienteAtual();
  c.obrigacoes.push({ nome: 'Nova obrigacao', desc: 'Descricao', status: 'pend' });
  var list = document.getElementById('obrig-list');
  var idx = c.obrigacoes.length - 1;
  var div = document.createElement('div');
  div.innerHTML = renderObrig(c.obrigacoes[idx], idx);
  list.appendChild(div.firstChild);
}

function removerObrig(idx) {
  var el = document.getElementById('obrig-' + idx);
  if (el) el.remove();
}

function getClienteAtual() {
  for (var i = 0; i < clientes.length; i++) { if (clientes[i].id === clienteAtualId) return clientes[i]; }
  return null;
}

function salvarCliente() {
  var c = getClienteAtual();
  c.nome = document.getElementById('campo-nome').value;
  c.cnpj = document.getElementById('campo-cnpj').value;
  c.tipo = document.getElementById('campo-tipo').value;
  c.socio = document.getElementById('campo-socio').value;
  c.regime = document.getElementById('campo-regime').value;
  c.codigo = document.getElementById('campo-codigo').value;
  c.email = document.getElementById('campo-email').value;
  c.telefone = document.getElementById('campo-telefone').value;
  c.endereco = document.getElementById('campo-endereco').value;
  c.situacao = document.getElementById('campo-situacao').value;
  c.certificado.tipo = document.getElementById('campo-cert-tipo').value;
  c.certificado.validade = document.getElementById('campo-cert-validade').value;
  c.certificado.emissor = document.getElementById('campo-cert-emissor').value;
  c.obs = document.getElementById('campo-obs').value;

  // Salva obrigacoes
  var novas = [];
  var items = document.getElementById('obrig-list').children;
  for (var i = 0; i < items.length; i++) {
    var el = items[i];
    var nomeEl = el.querySelector('[id^="oname-"]');
    var descEl = el.querySelector('[id^="odesc-"]');
    var stEl = el.querySelector('[id^="ostatus-"]');
    if (nomeEl && stEl) {
      novas.push({ nome: nomeEl.value, desc: descEl ? descEl.value : '', status: stEl.value });
    }
  }
  c.obrigacoes = novas;

  salvarDados();
  // Atualiza header da ficha
  document.getElementById('ficha-avatar').textContent = iniciais(c.nome);
  document.getElementById('ficha-nome-label').textContent = c.nome;
  document.getElementById('ficha-cnpj-label').textContent = 'CNPJ: ' + c.cnpj;

  mostrarToast('Salvo com sucesso!');
}

function excluirCliente() {
  if (!confirm('Tem certeza que deseja excluir este cliente?')) return;
  for (var i = 0; i < clientes.length; i++) {
    if (clientes[i].id === clienteAtualId) { clientes.splice(i, 1); break; }
  }
  salvarDados();
  voltarLista();
  mostrarToast('Cliente removido.');
}

function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

function voltarLista() {
  document.getElementById('ficha').style.display = 'none';
  document.getElementById('lista').style.display = 'block';
  renderLista(clientes);
}

function abrirModal() {
  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('m-nome').focus();
}

function fecharModal() {
  document.getElementById('modal-bg').classList.remove('show');
}

function criarCliente() {
  var nome = document.getElementById('m-nome').value.trim();
  if (!nome) { alert('Informe o nome do cliente.'); return; }
  var novo = {
    id: nextId++,
    nome: nome,
    cnpj: document.getElementById('m-cnpj').value || '-',
    tipo: document.getElementById('m-tipo').value,
    socio: document.getElementById('m-socio').value || '-',
    regime: document.getElementById('m-regime').value,
    situacao: 'Ativa',
    codigo: '-',
    email: '-',
    telefone: '-',
    endereco: '-',
    tags: [document.getElementById('m-regime').value],
    obrigacoes: [],
    certificado: { tipo: 'e-CNPJ A1', validade: '', emissor: '-' },
    obs: ''
  };
  clientes.push(novo);
  salvarDados();
  fecharModal();
  document.getElementById('m-nome').value = '';
  document.getElementById('m-cnpj').value = '';
  document.getElementById('m-socio').value = '';
  renderLista(clientes);
  mostrarToast('Cliente criado com sucesso!');
}
</script>
</body>
